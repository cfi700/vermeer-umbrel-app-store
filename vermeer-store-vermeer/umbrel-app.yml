manifestVersion: 1
id: vermeer-store-vermeer
category: files
name: Vermeer
version: "1.5.0"
tagline: Encrypted photo albums – private by design
description: >-
  Vermeer stores your photos AES-256 encrypted on your Umbrel.
  All images are encrypted server-side – neither originals nor
  thumbnails are stored in plain text on disk.

  Features:

  - AES-256-CBC encryption for all photos and thumbnails

  - Album and sub-album structure with unlimited depth

  - User management with per-album access control

  - Download protection: only the owner can download originals

  - DE / EN language toggle

  Default login: admin / admin (change immediately!)

releaseNotes: >-
  1.5.0 – Milestone release. Highlights since 1.0: per-user statistics
  with password gate and independent reset, observer login history,
  photo moving between albums, full-resolution lightbox, photo-only
  views for observers, hidden-album relocking, auto-logout (idle, tab
  close, tab switch), downloads restricted to owner ZIP backups, and
  numerous bug fixes and security refinements.

developer: Vermeer
website: https://github.com/cfi700/vermeer-umbrel-app-store
dependencies: []
repo: https://github.com/cfi700/vermeer-umbrel-app-store
support: https://github.com/cfi700/vermeer-umbrel-app-store/issues
port: 3769
gallery: []
path: ""
defaultUsername: admin
defaultPassword: admin
