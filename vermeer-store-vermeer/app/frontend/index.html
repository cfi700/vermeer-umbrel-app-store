<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vermeer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  :root {
    --bg:       #0d0d0f;
    --surface:  #151518;
    --surface2: #1c1c21;
    --border:   #2a2a32;
    --accent:   #c8a96e;
    --accent2:  #e8c98a;
    --text:     #e8e6e0;
    --muted:    #7a7872;
    --dim:      #3a3835;
    --danger:   #c0534a;
    --r:        8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse 80% 40% at 50% -10%,#1e160a 0%,var(--bg) 70%);position:relative}
  .lang-toggle-login{position:absolute;top:20px;right:20px}
  .login-card{width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px}
  .login-logo{text-align:center;margin-bottom:40px}
  .login-logo .icon{font-size:40px;display:block;margin-bottom:14px}
  .login-logo h1{font-family:'DM Serif Display',serif;font-size:30px;color:var(--accent);letter-spacing:-.5px}
  .login-logo p{color:var(--muted);font-size:11px;margin-top:5px;letter-spacing:2px;text-transform:uppercase}

  /* LANG TOGGLE */
  .lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;flex-shrink:0}
  .lang-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;border:none;
    background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
    cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
  .lang-btn .flag{font-size:14px}
  .lang-btn.active{background:var(--accent);color:#0d0c08}
  .lang-btn:not(.active):hover{color:var(--text)}

  /* FORM */
  .form-group{margin-bottom:16px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;font-weight:500}
  input[type=text],input[type=password],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:70px}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r);border:none;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#0d0c08;font-weight:600;justify-content:center}
  .btn-primary:hover{background:var(--accent2)}
  .btn-full{width:100%;padding:12px;font-size:14px}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(192,83,74,.3)}
  .btn-danger:hover{background:rgba(192,83,74,.1)}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-xs{padding:3px 8px;font-size:11px}

  .error-msg{background:rgba(192,83,74,.1);border:1px solid rgba(192,83,74,.3);color:#e07870;
    padding:10px 14px;border-radius:var(--r);margin-top:12px;font-size:13px}

  /* NAVBAR */
  #app{display:none;min-height:100vh}
  .navbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;z-index:100}
  .navbar-brand{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);flex-shrink:0}
  .navbar-nav{display:flex;gap:2px;flex:1}
  .nav-btn{padding:6px 13px;border-radius:6px;border:none;background:transparent;color:var(--muted);
    font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
  .nav-btn:hover{background:var(--surface2);color:var(--text)}
  .nav-btn.active{background:var(--surface2);color:var(--accent)}
  .navbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
  .user-info{font-size:12px;color:var(--muted)}
  .user-info strong{color:var(--accent)}
  .admin-pill{background:rgba(200,169,110,.15);color:var(--accent);font-size:10px;padding:2px 7px;
    border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;border:1px solid rgba(200,169,110,.2)}

  /* PAGES */
  .page{display:none;padding:20px 24px;max-width:1500px;margin:0 auto}
  .page.active{display:block}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .page-title{font-family:'DM Serif Display',serif;font-size:22px}
  .enc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:rgba(200,169,110,.1);
    color:var(--accent);padding:2px 8px;border-radius:20px;border:1px solid rgba(200,169,110,.2);
    font-family:'DM Sans',sans-serif;font-weight:500;vertical-align:middle;margin-left:8px}

  /* ALBUM LAYOUT */
  .albums-layout{display:flex;gap:16px;min-height:calc(100vh - 130px)}

  /* Sidebar */
  .album-sidebar{width:240px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;max-height:calc(100vh - 130px)}
  .album-sidebar-header{padding:4px 8px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);font-weight:500;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:4px}
  .tree-node{display:flex;align-items:center;border-radius:7px;cursor:pointer;transition:background .12s;position:relative}
  .tree-node:hover{background:var(--surface2)}
  .tree-node.active{background:rgba(200,169,110,.12)}
  .tree-node.active .tree-label{color:var(--accent)}
  .tree-indent{flex-shrink:0}
  .tree-toggle{width:20px;height:30px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:var(--muted);font-size:10px;cursor:pointer;border:none;background:transparent}
  .tree-icon{font-size:14px;flex-shrink:0;padding:0 3px}
  .tree-label{flex:1;padding:5px 2px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tree-count{font-size:10px;color:var(--muted);padding-right:6px;flex-shrink:0}
  .tree-actions{display:none;gap:2px;padding-right:4px;flex-shrink:0}
  .tree-node:hover .tree-actions{display:flex}
  .tree-action-btn{padding:2px 4px;border-radius:4px;border:none;background:transparent;
    color:var(--muted);cursor:pointer;font-size:11px;transition:all .12s}
  .tree-action-btn:hover{background:var(--border);color:var(--text)}

  /* Main content */
  .album-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}

  /* Content toolbar */
  .content-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
  .breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;flex:1;min-width:0;flex-wrap:wrap}
  .breadcrumb-item{color:var(--muted);cursor:pointer;transition:color .15s;white-space:nowrap}
  .breadcrumb-item:hover{color:var(--accent)}
  .breadcrumb-item.current{color:var(--text);cursor:default;font-weight:500}
  .breadcrumb-sep{color:var(--dim)}
  .toolbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

  /* Selection toolbar - shown when photos are selected */
  .selection-bar{display:none;align-items:center;gap:8px;flex-wrap:wrap;
    background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.25);
    border-radius:10px;padding:8px 12px}
  .selection-bar.visible{display:flex}
  .selection-count{font-size:13px;color:var(--accent);font-weight:500;flex:1}

  /* Upload progress - compact */
  .upload-progress{display:none;background:var(--surface);border:1px solid var(--border);
    border-radius:8px;padding:10px 14px;font-size:13px}
  .upload-progress.visible{display:block}
  .progress-wrap{background:var(--surface2);border-radius:100px;height:4px;margin-top:8px}
  .progress-bar{height:100%;background:var(--accent);border-radius:100px;width:0%;transition:width .3s}
  #file-input{display:none}

  /* Sub-album grid */
  .subalbum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .subalbum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:12px 10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px}
  .subalbum-card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .subalbum-card .sa-icon{font-size:24px}
  .subalbum-card .sa-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .subalbum-card .sa-count{font-size:11px;color:var(--muted)}
  .subalbum-card .sa-cover{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:6px;
    user-select:none;-webkit-user-drag:none;display:block}

  /* Photo grid */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .photo-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    overflow:hidden;transition:all .15s;position:relative;cursor:pointer}
  .photo-img-wrap{position:relative;width:100%;cursor:pointer}
  .photo-card:hover{border-color:var(--muted)}
  .photo-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(200,169,110,.3)}

  /* Checkbox overlay */
  .photo-check{position:absolute;top:7px;left:7px;z-index:2;
    width:20px;height:20px;border-radius:5px;
    border:2px solid rgba(255,255,255,.6);background:rgba(0,0,0,.3);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;cursor:pointer;backdrop-filter:blur(2px)}
  .photo-card:hover .photo-check,
  .photo-card.selected .photo-check{border-color:var(--accent)}
  .photo-card.selected .photo-check{background:var(--accent)}
  .photo-check-icon{color:#0d0c08;font-size:12px;font-weight:700;display:none}
  .photo-card.selected .photo-check-icon{display:block}

  .photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface2);display:block;cursor:pointer;user-select:none;-webkit-user-drag:none}
  .thumb-placeholder{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;
    align-items:center;justify-content:center;font-size:28px;color:var(--dim)}
  .thumb-loading{animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .photo-info{padding:6px 8px}
  .photo-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
  .photo-meta{font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
  .owner-tag{font-size:9px;background:var(--surface2);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
  .shared-badge{position:absolute;top:7px;right:7px;background:rgba(200,169,110,.85);color:#0d0c08;font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;backdrop-filter:blur(2px);pointer-events:none}

  /* Empty states */
  .empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
  .empty-state .e-icon{font-size:40px;margin-bottom:12px}
  .empty-state p{font-size:14px}
  .no-album-selected{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;
    gap:14px;color:var(--muted);text-align:center;padding:48px}
  .no-album-selected .big-icon{font-size:52px;opacity:.4}

  /* LIGHTBOX */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;
    flex-direction:column;align-items:center;justify-content:center}
  #lightbox.open{display:flex}

  .lb-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;
    width:100%;padding:0;min-height:0;position:relative}
  #lightbox-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;
    box-shadow:0 24px 80px rgba(0,0,0,.8);user-select:none;
    -webkit-user-drag:none;pointer-events:none}

  /* Transparent overlay over lightbox image - blocks right-click on img element */
  .lb-img-overlay{position:absolute;inset:0;z-index:1;cursor:default}

  /* Nav arrows */
  .lb-arrow{position:absolute;top:50%;transform:translateY(-50%);
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text);
    width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:20px;transition:all .15s;z-index:5;backdrop-filter:blur(4px)}
  .lb-arrow:hover{background:rgba(255,255,255,.18)}
  .lb-arrow.left{left:16px}
  .lb-arrow.right{right:16px}
  .lb-arrow:disabled{opacity:.2;cursor:default}

  /* Lightbox top bar */
  .lb-topbar{position:fixed;top:0;left:0;right:0;height:52px;
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:10}
  .lb-title{font-size:13px;color:var(--text);opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
  .lb-counter{font-size:12px;color:var(--muted)}
  .lb-close{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text);
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;transition:all .15s}
  .lb-close:hover{background:rgba(255,255,255,.18)}

  /* Lightbox filmstrip */
  .lb-strip{height:72px;width:100%;display:flex;align-items:center;gap:4px;
    padding:8px 16px;overflow-x:auto;background:rgba(0,0,0,.5);flex-shrink:0;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .lb-strip-thumb{height:54px;width:54px;object-fit:cover;border-radius:4px;
    cursor:pointer;opacity:.5;transition:all .15s;flex-shrink:0;border:2px solid transparent}
  .lb-strip-thumb.active{opacity:1;border-color:var(--accent)}
  .lb-strip-thumb:hover{opacity:.85}

  /* TABLE */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
  .card-header{padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);
    font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);background:var(--surface2);font-weight:500;border-bottom:1px solid var(--border)}
  td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.015)}
  .td-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

  /* MODAL */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
    align-items:center;justify-content:center;padding:20px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:100%}
  .modal-lg{width:600px}
  .modal h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .perm-tree{max-height:280px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:6px}
  .perm-album-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px}
  .perm-album-item:hover{background:rgba(255,255,255,.04)}
  .perm-album-item input[type=checkbox]{width:auto;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .perm-album-owner{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0}
  .perm-album-indent{flex-shrink:0}

  /* TOAST */
  #toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:12px 18px;font-size:13px;z-index:2000;transform:translateY(80px);opacity:0;
    transition:all .25s cubic-bezier(.4,0,.2,1);max-width:300px;pointer-events:none}
  #toast.show{transform:none;opacity:1}
  #toast.success{border-color:rgba(90,158,111,.4);color:#80c898}
  #toast.error{border-color:rgba(192,83,74,.4);color:#e07870}

  .actions-row{display:flex;gap:6px;flex-wrap:wrap}
  .divider{height:1px;background:var(--border);margin:4px 0}

  /* ── STATS DASHBOARD ── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 14px;text-align:center}
  .stat-value{font-family:'DM Serif Display',serif;font-size:28px;color:var(--accent);line-height:1}
  .stat-label{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.8px}
  .stats-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
  .stats-section-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
    font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .stats-table{width:100%;border-collapse:collapse}
  .stats-table th{padding:9px 14px;text-align:left;font-size:11px;text-transform:uppercase;
    letter-spacing:.8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
  .stats-table td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
  .stats-table tr:last-child td{border-bottom:none}
  .stats-table tr:hover td{background:rgba(255,255,255,.015)}
  .rank-badge{display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;
    background:var(--surface2);color:var(--muted);flex-shrink:0}
  .rank-badge.gold{background:rgba(200,169,110,.2);color:var(--accent)}
  .rank-badge.silver{background:rgba(180,180,180,.15);color:#aaa}
  .rank-badge.bronze{background:rgba(180,120,80,.15);color:#c8916e}
  .bar-wrap{background:var(--surface2);border-radius:100px;height:6px;width:100%;min-width:80px}
  .bar-fill{height:100%;border-radius:100px;background:var(--accent);transition:width .4s}
  .timeline-chart{padding:16px;display:flex;align-items:flex-end;gap:3px;height:100px;overflow-x:auto}
  .tl-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:20px}
  .tl-bar{background:var(--accent);border-radius:3px 3px 0 0;width:100%;transition:height .3s;opacity:.8;min-height:2px}
  .tl-bar:hover{opacity:1}
  .tl-label{font-size:9px;color:var(--muted);white-space:nowrap;writing-mode:vertical-rl;
    text-orientation:mixed;transform:rotate(180deg);height:36px;overflow:hidden}
  .shared-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px}


  /* ── SETUP / RECOVERY MODALS ── */
  .recovery-code-box{background:var(--surface2);border:2px dashed var(--accent);border-radius:10px;
    padding:18px;text-align:center;font-family:monospace;font-size:17px;letter-spacing:1.5px;
    color:var(--accent);margin:14px 0;user-select:all;word-break:break-all}
  .warn-box{background:rgba(192,83,74,.08);border:1px solid rgba(192,83,74,.3);border-radius:8px;
    padding:12px 14px;font-size:12px;color:#e0a49e;margin:12px 0;line-height:1.5}
  .info-box{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.25);border-radius:8px;
    padding:12px 14px;font-size:12px;color:var(--muted);margin:12px 0;line-height:1.5}
  .checkbox-row{display:flex;align-items:flex-start;gap:9px;margin:14px 0;font-size:13px;cursor:pointer}
  .checkbox-row input{width:auto;accent-color:var(--accent);margin-top:2px;cursor:pointer}
  .link-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;
    text-decoration:underline;font-family:'DM Sans',sans-serif;padding:0;margin-top:14px;display:block;width:100%;text-align:center}
  .link-btn:hover{color:var(--accent)}
  .thumb-pending{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:11px;text-align:center;padding:8px}
  .thumb-pending .tp-icon{font-size:24px;opacity:.5}


  /* ── TILE VIEW (v1.0.0) ── */
  .albums-layout{display:block !important}
  .album-sidebar{display:none !important}
  .album-content{width:100%}
  .album-tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:14px}
  .album-tile{position:relative;aspect-ratio:16/10;border-radius:12px;overflow:hidden;cursor:pointer;
    background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border);
    transition:transform .15s,border-color .15s;user-select:none;-webkit-user-select:none}
  .album-tile:hover{transform:translateY(-2px);border-color:var(--accent)}
  .album-tile .at-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    user-select:none;-webkit-user-drag:none;pointer-events:none}
  .album-tile .at-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 55%,transparent 100%)}
  .album-tile .at-info{position:absolute;left:10px;right:10px;bottom:8px;z-index:2}
  .album-tile .at-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.6)}
  .album-tile .at-meta{font-size:11px;color:rgba(255,255,255,.75);display:flex;gap:8px;align-items:center}
  .album-tile .at-bigicon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:38px;opacity:.5}
  .album-tile.locked .at-bigicon{opacity:.85}
  .album-tile .at-actions{position:absolute;top:6px;right:6px;z-index:3;display:none;gap:4px}
  .album-tile:hover .at-actions{display:flex}
  .album-tile.show-actions .at-actions{display:flex}
  .at-act-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:13px;
    background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center}
  .at-act-btn:hover{background:rgba(0,0,0,.8)}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:14px 2px 8px;font-weight:600}
  .pin-input{width:100%;text-align:center;font-size:28px;letter-spacing:14px;font-family:monospace;padding:12px}

  /* ── MOBILE ── */

    .navbar{padding:0 10px;gap:8px;flex-wrap:wrap;height:auto;min-height:52px}

    .selection-bar.visible{position:fixed;left:8px;right:8px;bottom:8px;z-index:200;

    .content-toolbar{position:sticky;top:56px;z-index:50}
  }

// i18n
let lang = localStorage.getItem('vermeer_lang')||(navigator.language.startsWith('de')?'de':'en');
function t(key,...a){const v=(T[lang]??T.de)[key]??T.de[key]??key;return typeof v==='function'?v(...a):v;}
function setLang(l){lang=l;localStorage.setItem('vermeer_lang',l);applyTranslations();if(me&&currentAlbumId)loadAlbumContent(currentAlbumId);}
function applyTranslations(){
  document.documentElement.lang=lang;
  ['de','en'].forEach(l=>['lang-login-','lang-app-'].forEach(p=>{const el=document.getElementById(p+l);if(el)el.classList.toggle('active',l===lang);}));
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.getAttribute('data-i18n'));if(typeof v==='string'&&el.children.length===0)el.textContent=v;});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-ph'));});
  document.querySelectorAll('option[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  if(me)updateLoggedInLabel();
}
function updateLoggedInLabel(){const el=document.getElementById('logged-in-label');if(el)el.innerHTML=`<span style="color:var(--muted)">${t('nav.loggedinas')} <strong style="color:var(--accent)">${esc(me.username)}</strong></span>`;}

// ── AUTH ────────────────────────────────────────────────────────────
let pendingBoot=false; // wait for recovery code confirmation before booting

async function doLogin(){
  const username=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  const errEl=document.getElementById('login-err');errEl.style.display='none';
  try{
    const r=await api('POST','/api/login',{username,password});
    const data=await r.json();
    if(!r.ok){errEl.textContent=data.error||t('login.err.invalid');errEl.style.display='block';return;}
    me=data;

    // Case A: forced first-login setup
    if(data.mustChangePassword){
      document.getElementById('setup-existing-warn').style.display=data.hasExistingData?'block':'none';
      document.getElementById('setup-recovery-group').style.display=data.hasExistingData?'block':'none';
      ['setup-recovery','setup-pw','setup-pw2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      document.getElementById('modal-setup-pw').classList.add('open');
      return;
    }
    // Case B: legacy user auto-setup → recovery code delivered once
    if(data.recoveryCode){
      showRecoveryCode(data.recoveryCode);
      pendingBoot=true;
      return;
    }
    // Case C: normal login
    bootApp();
  }catch{errEl.textContent=t('login.err.connection');errEl.style.display='block';}
}

async function doSetupPassword(){
  const pw =document.getElementById('setup-pw').value;
  const pw2=document.getElementById('setup-pw2').value;
  const recoveryCode=document.getElementById('setup-recovery').value.trim();
  if(pw!==pw2){toast(t('setup.pw_mismatch'),'error');return;}
  if(pw.length<8){toast(t('setup.pw_short'),'error');return;}
  const r=await api('POST','/api/me/setup-password',{newPassword:pw,recoveryCode:recoveryCode||undefined});
  const data=await r.json();
  if(!r.ok){toast(data.error,'error');return;}
  closeModal('modal-setup-pw');
  showRecoveryCode(data.recoveryCode);
  pendingBoot=true;
}

function showRecoveryCode(code){
  document.getElementById('recovery-code-display').textContent=code;
  document.getElementById('reccode-confirm').checked=false;
  document.getElementById('reccode-continue').disabled=true;
  document.getElementById('modal-recovery-code').classList.add('open');
}

async function copyRecoveryCode(){
  const el=document.getElementById('recovery-code-display');
  const code=el.textContent;
  let copied=false;
  // 1) Moderne API – nur in Secure Contexts (HTTPS/localhost) verfügbar
  if(navigator.clipboard&&window.isSecureContext){
    try{await navigator.clipboard.writeText(code);copied=true;}catch{}
  }
  // 2) Fallback für HTTP (z.B. umbrel.local): verstecktes Textfeld + execCommand
  if(!copied){
    const ta=document.createElement('textarea');
    ta.value=code;ta.setAttribute('readonly','');
    ta.style.position='fixed';ta.style.left='-9999px';ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();ta.setSelectionRange(0,code.length);
    try{copied=document.execCommand('copy');}catch{}
    document.body.removeChild(ta);
  }
  if(copied){toast(t('reccode.copied'),'success');return;}
  // 3) Letzte Stufe: Code markieren, damit manuell Strg+C möglich ist
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  toast(t('reccode.copy_manual'),'error');
}

document.addEventListener('DOMContentLoaded',()=>{
  const cb=document.getElementById('reccode-confirm');
  if(cb)cb.addEventListener('change',()=>{document.getElementById('reccode-continue').disabled=!cb.checked;});
});

function confirmRecoveryCode(){
  closeModal('modal-recovery-code');
  if(pendingBoot){pendingBoot=false;bootApp();}
}

function openRecoverModal(){
  ['rec-user','rec-code','rec-pw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rec-err').style.display='none';
  document.getElementById('modal-recover').classList.add('open');
}

async function doRecover(){
  const username=document.getElementById('rec-user').value.trim();
  const recoveryCode=document.getElementById('rec-code').value.trim();
  const newPassword=document.getElementById('rec-pw').value;
  const errEl=document.getElementById('rec-err');errEl.style.display='none';
  if(newPassword.length<8){errEl.textContent=t('setup.pw_short');errEl.style.display='block';return;}
  const r=await api('POST','/api/recover',{username,recoveryCode,newPassword});
  const data=await r.json();
  if(!r.ok){errEl.textContent=data.error;errEl.style.display='block';return;}
  closeModal('modal-recover');
  toast(t('recover.success'),'success');
  pendingBoot=false; // must log in with new password afterwards
  showRecoveryCode(data.recoveryCode);
}

async function doLogout(){await fetch('/api/logout',{method:'POST'});location.reload();}
async function checkSession(){
  try{
    const r=await fetch('/api/me');
    if(!r.ok)return;
    me=await r.json();
    if(me.mustChangePassword){
      document.getElementById('setup-existing-warn').style.display='none';
      document.getElementById('setup-recovery-group').style.display='none';
      document.getElementById('modal-setup-pw').classList.add('open');
      return;
    }
    if(!me.hasDEK){
      // Session valid but key lost (server restart) → force re-login
      await fetch('/api/logout',{method:'POST'});
      return;
    }
    bootApp();
  }catch{}
}
function bootApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  if(me.type==='admin'){
    document.getElementById('admin-pill').style.display='inline-block';

  if(me.type==='user'||me.type==='admin'){

  }
  if(me.type==='observer'){
    const ec=document.getElementById('export-card');if(ec)ec.style.display='none';
  }

}

async function loadStats() {
  const wrap = document.getElementById('stats-content');
  wrap.innerHTML = `<div class="empty-state"><div class="e-icon">⏳</div><p>${t('loading')}</p></div>`;
  try {
    const r = await fetch('/api/stats');
    if (!r.ok) { wrap.innerHTML = `<div class="empty-state"><p>${t('error')}</p></div>`; return; }
    const s = await r.json();
    renderStats(s, wrap);
  } catch { wrap.innerHTML = `<div class="empty-state"><p>${t('error')}</p></div>`; }
}

function renderStats(s, wrap) {
  const o = s.overview;
  wrap.innerHTML = '';

  // ── Overview cards ──
  const overviewSection = document.createElement('div');
  overviewSection.className = 'stats-section';
  overviewSection.innerHTML = `<div class="stats-section-header">📊 ${t('stats.overview')}</div>`;
  const grid = document.createElement('div');
  grid.className = 'stats-grid';
  grid.style.padding = '16px';
  [
    { v: o.totalPhotos,    l: t('stats.total_photos'),    icon: '🖼' },
    { v: o.totalAlbums,    l: t('stats.total_albums'),     icon: '📁' },
    { v: o.totalUsers,     l: t('stats.total_users'),      icon: '👤' },
    { v: o.totalViews,     l: t('stats.total_views'),      icon: '👁' },
    { v: o.totalDownloads, l: t('stats.total_downloads'),  icon: '⬇' },
    { v: o.sharedPhotos,   l: t('stats.shared'),           icon: '🔗' },
    { v: o.totalStorageMB + ' MB', l: t('stats.storage_mb'), icon: '💾' },
    { v: o.appVersion || '–',       l: t('stats.version'),    icon: '🏷' },
  ].forEach(({ v, l, icon }) => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-value">${icon} ${v}</div><div class="stat-label">${l}</div>`;
    grid.appendChild(card);
  });
  overviewSection.appendChild(grid);
  wrap.appendChild(overviewSection);

  // ── Timeline ──
  if (s.viewsTimeline && s.viewsTimeline.length > 0) {
    const tl = document.createElement('div');
    tl.className = 'stats-section';
    tl.innerHTML = `<div class="stats-section-header">📈 ${t('stats.timeline')}</div>`;
    const chart = document.createElement('div');
    chart.className = 'timeline-chart';
    const maxViews = Math.max(...s.viewsTimeline.map(e => e.count), 1);
    s.viewsTimeline.forEach(({ date, count }) => {
      const barWrap = document.createElement('div');
      barWrap.className = 'tl-bar-wrap';
      barWrap.title = `${date}: ${count} ${t('stats.views')}`;
      const bar = document.createElement('div');
      bar.className = 'tl-bar';
      bar.style.height = Math.max(2, (count / maxViews) * 80) + 'px';
      const lbl = document.createElement('div');
      lbl.className = 'tl-label';
      lbl.textContent = date.slice(5); // MM-DD
      barWrap.appendChild(bar);
      barWrap.appendChild(lbl);
      chart.appendChild(barWrap);
    });
    tl.appendChild(chart);
    wrap.appendChild(tl);
  }

  // ── Top Photos ──
  renderStatsTable(wrap, `🖼 ${t('stats.top_photos')}`, s.topPhotos,
    [t('stats.photo'), t('stats.album'), t('stats.owner'), t('stats.views'), t('stats.unique'), t('stats.downloads'), ''],
    (p, i, maxV) => `
      <td><span class="rank-badge ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span></td>
      <td>${esc(p.name)}${p.shared?` <span class="shared-dot"></span>`:''}  </td>
      <td style="color:var(--muted);font-size:12px">${esc(p.albumName)}</td>
      <td style="color:var(--muted);font-size:12px">${esc(p.ownerName)}</td>
      <td><strong>${p.views}</strong></td>
      <td style="color:var(--muted)">${p.uniqueViewers}</td>
      <td style="color:var(--muted)">${p.downloads}</td>
      <td style="width:100px"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(p.views/maxV*100)}%"></div></div></td>`,
    p => p.views
  );

  // ── Top Albums ──
  renderStatsTable(wrap, `📁 ${t('stats.top_albums')}`, s.topAlbums,
    [t('stats.album'), t('stats.owner'), t('stats.photos'), t('stats.views'), ''],
    (a, i, maxV) => `
      <td><span class="rank-badge ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span></td>
      <td>${esc(a.name)}</td>
      <td style="color:var(--muted);font-size:12px">${esc(a.ownerName)}</td>
      <td style="color:var(--muted)">${a.photoCount}</td>
      <td><strong>${a.views}</strong></td>
      <td style="width:100px"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(a.views/maxV*100)}%"></div></div></td>`,
    a => a.views
  );

  // ── Top Viewers ──
  renderStatsTable(wrap, `👁 ${t('stats.top_viewers')}`, s.topViewers,
    ['Benutzer / User', t('stats.views'), ''],
    (u, i, maxV) => `
      <td><span class="rank-badge ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span></td>
      <td>${esc(u.username)}</td>
      <td><strong>${u.views}</strong></td>
      <td style="width:120px"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(u.views/maxV*100)}%"></div></div></td>`,
    u => u.views
  );

  // ── Top Uploaders ──
  renderStatsTable(wrap, `📤 ${t('stats.top_uploaders')}`, s.topUploaders,
    ['Benutzer / User', t('stats.photos'), t('stats.storage_mb'), ''],
    (u, i, maxV) => `
      <td><span class="rank-badge ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span></td>
      <td>${esc(u.username)}</td>
      <td><strong>${u.photos}</strong></td>
      <td style="color:var(--muted)">${u.sizeMB} MB</td>
      <td style="width:100px"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(u.photos/maxV*100)}%"></div></div></td>`,
    u => u.photos
  );
}

function renderStatsTable(wrap, title, rows, headers, rowFn, valueFn) {
  const sec = document.createElement('div');
  sec.className = 'stats-section';
  if (!rows || rows.length === 0) {
    sec.innerHTML = `<div class="stats-section-header">${title}</div>
      <div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">${t('stats.no_data')}</div>`;
    wrap.appendChild(sec); return;
  }
  const maxV = Math.max(...rows.map(valueFn), 1);
  sec.innerHTML = `<div class="stats-section-header">${title}</div>
    <table class="stats-table">
      <thead><tr><th>#</th>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map((row, i) => `<tr>${rowFn(row, i, maxV)}</tr>`).join('')}</tbody>
    </table>`;
  wrap.appendChild(sec);
}

// ── Swipe-Back (Mobil): von linker Kante nach rechts wischen = Ebene hoch ──
(function(){
  let sx=0,sy=0,st=0,edge=false;
  document.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
    edge=sx<24;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!edge||e.changedTouches.length!==1)return;
    if(document.getElementById('lightbox').classList.contains('open'))return;
    const dx=e.changedTouches[0].clientX-sx, dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(Date.now()-st<450&&dx>70&&dx>dy*2&&currentAlbumId){
      const cur=allAlbums.find(a=>a.id===currentAlbumId);
      if(cur&&cur.parentId)selectAlbum(cur.parentId);else goHome();
    }
  },{passive:true});
})();

async function loadAlbums(){
  const r=await fetch('/api/albums');allAlbums=await r.json();
  if(currentAlbumId && !allAlbums.find(a=>a.id===currentAlbumId)) currentAlbumId=null;
  loadAlbumContent(currentAlbumId);
}
function albumChildren(pid){return allAlbums.filter(a=>a.parentId===pid);}
function selectAlbum(id){
  const a=allAlbums.find(x=>x.id===id);
  if(a&&a.locked){openPinModal(a);return;}
  currentAlbumId=id;selectedPhotos.clear();loadAlbumContent(id);
}
function goHome(){currentAlbumId=null;selectedPhotos.clear();loadAlbumContent(null);}

// ═══════════════════════════════════════════════════════════════════
// ALBUM CONTENT
// ═══════════════════════════════════════════════════════════════════
async function loadAlbumContent(albumId){
  const content=document.getElementById('album-content');
  content.innerHTML='';
  const isHome=!albumId;
  const album=isHome?null:allAlbums.find(a=>a.id===albumId);
  if(!isHome&&!album){currentAlbumId=null;return loadAlbumContent(null);}
  currentAlbumCanManage=!isHome&&!!album.canManage;
  selectedPhotos.clear();
  const isObserver=me&&me.type==='observer';
  const children=allAlbums.filter(a=>a.parentId===(isHome?null:albumId)&&a.id!==currentAlbumId);
  const rootTiles=isHome?allAlbums.filter(a=>a.parentId===null):children;

  // ── Toolbar mit Breadcrumb ──
  const toolbar=document.createElement('div');toolbar.className='content-toolbar';
  const bc=document.createElement('div');bc.className='breadcrumb';
  const homeItem=document.createElement('span');
  homeItem.className='breadcrumb-item'+(isHome?' current':'');
  homeItem.textContent=t('home.title');
  if(!isHome)homeItem.onclick=goHome;
  bc.appendChild(homeItem);
  if(!isHome){
    buildBreadcrumb(albumId).forEach((cr)=>{
      const sep=document.createElement('span');sep.className='breadcrumb-sep';sep.textContent='/';bc.appendChild(sep);
      const item=document.createElement('span');
      item.className='breadcrumb-item'+(cr.id===albumId?' current':'');
      item.textContent=cr.name;
      if(cr.id!==albumId)item.onclick=()=>selectAlbum(cr.id);
      bc.appendChild(item);
    });
  }
  toolbar.appendChild(bc);
  const tacts=document.createElement('div');tacts.className='toolbar-actions';
  if(!isObserver&&(isHome||album.canManage)&&(isHome?me.type!=='observer':true)){
    const btnNew=document.createElement('button');btnNew.className='btn btn-ghost btn-sm';
    btnNew.textContent=isHome?t('albums.new_root'):t('albums.new_sub');
    btnNew.onclick=()=>openNewAlbumModal(isHome?null:albumId);
    if(me.type!=='observer')tacts.appendChild(btnNew);
  }
  if(!isHome&&album.canUpload){
    const btnUp=document.createElement('button');btnUp.className='btn btn-primary btn-sm';
    btnUp.textContent=t('upload.btn');
    btnUp.onclick=()=>document.getElementById('file-input').click();
    tacts.appendChild(btnUp);
  }
  toolbar.appendChild(tacts);content.appendChild(toolbar);

  // ── Selection bar (nicht für Beobachter / Shared) ──
  if(!isHome&&!isObserver&&albumId!=='__shared__'){
    const selBar=document.createElement('div');selBar.className='selection-bar';selBar.id='selection-bar';
    selBar.innerHTML=`<span class="selection-count" id="sel-count"></span>
      <button class="btn btn-ghost btn-sm" onclick="toggleSelectAll()" id="btn-sel-all">${t('selection.select_all')}</button>
      <button class="btn btn-ghost btn-sm" onclick="downloadSelected()" id="btn-dl" style="display:none">${t('selection.download')}</button>
      <button class="btn btn-ghost btn-sm" onclick="shareSelected(true)"  id="btn-share"    style="display:none">${t('selection.share')}</button>
      <button class="btn btn-ghost btn-sm" onclick="shareSelected(false)" id="btn-unshare"  style="display:none">${t('selection.unshare')}</button>
      <button class="btn btn-ghost btn-sm" onclick="setCoverSelected()" id="btn-cover" style="display:none">${t('cover.set_btn')}</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSelected()" id="btn-del-sel" style="display:none">${t('selection.delete')}</button>`;
    content.appendChild(selBar);
  }

  // ── Upload progress ──
  const prog=document.createElement('div');prog.className='upload-progress';prog.id='upload-progress';
  prog.innerHTML='<span id="upload-status"></span><div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>';
  content.appendChild(prog);

  // ── Album-Kacheln ──
  if(rootTiles.length){
    if(!isHome){const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=t('albums.sidebar_title');content.appendChild(lbl);}
    const grid=document.createElement('div');grid.className='album-tile-grid';
    rootTiles.forEach(a=>grid.appendChild(buildAlbumTile(a)));
    content.appendChild(grid);
  } else if(isHome){
    content.innerHTML+=`<div class="empty-state"><div class="e-icon">📁</div><p>${t('albums.no_albums')}</p></div>`;
  }

  // ── Fotos ──
  if(!isHome){
    if(rootTiles.length){const lbl2=document.createElement('div');lbl2.className='section-label';lbl2.textContent='Fotos';content.appendChild(lbl2);}
    const photosWrap=document.createElement('div');photosWrap.id='photos-wrap';
    photosWrap.innerHTML=`<div class="empty-state"><div class="e-icon">⏳</div><p>${t('loading')}</p></div>`;
    content.appendChild(photosWrap);
    loadPhotos(albumId,photosWrap);
  }
}

function buildAlbumTile(a){
  const tile=document.createElement('div');
  tile.className='album-tile'+(a.locked?' locked':'');
  const subCount=allAlbums.filter(x=>x.parentId===a.id).length;

  if(a.locked){
    const big=document.createElement('div');big.className='at-bigicon';big.textContent='🙈';tile.appendChild(big);
  } else if(a.coverPhotoId){
    const big=document.createElement('div');big.className='at-bigicon';big.textContent=a._virtual?'📢':'📁';tile.appendChild(big);
    fetch(`/api/photos/${a.coverPhotoId}/thumb`).then(r=>r.ok?r.blob():null).then(b=>{
      if(!b)return;
      const img=document.createElement('img');img.className='at-cover';img.draggable=false;
      img.src=URL.createObjectURL(b);
      img.onload=()=>big.remove();   // Icon weg, sobald Cover sichtbar
      tile.insertBefore(img,tile.firstChild);
    }).catch(()=>{});
  } else {
    const big=document.createElement('div');big.className='at-bigicon';big.textContent=a._virtual?'📢':(a.hidden?'🙈':'📁');tile.appendChild(big);
  }

  const shade=document.createElement('div');shade.className='at-shade';tile.appendChild(shade);
  const info=document.createElement('div');info.className='at-info';
  const nm=document.createElement('div');nm.className='at-name';
  nm.textContent=(a.effectiveHidden?'🙈 ':'')+a.name;
  const meta=document.createElement('div');meta.className='at-meta';
  if(a.locked){meta.textContent='🔒 PIN';}
  else{
    const parts=[t('albums.photos_count',a.photoCount)];
    if(subCount)parts.push(t('tile.subalbums',subCount));
    meta.textContent=parts.join(' · ');
  }
  info.appendChild(nm);info.appendChild(meta);tile.appendChild(info);

  // Aktionen (nur canManage)
  if(a.canManage){
    const acts=document.createElement('div');acts.className='at-actions';
    const mk=(icon,title,fn)=>{const b=document.createElement('button');b.className='at-act-btn';b.textContent=icon;b.title=title;
      b.addEventListener('click',e=>{e.stopPropagation();fn();});return b;};
    acts.appendChild(mk('✏️',t('albums.rename'),()=>openEditAlbumModal(a)));
    acts.appendChild(mk(a.hidden?'👁':'🙈',a.hidden?t('hide.unhide_btn'):t('hide.btn'),()=>openHideModal(a)));
    acts.appendChild(mk('🗑',t('albums.delete'),()=>deleteAlbum(a.id)));
    tile.appendChild(acts);
    // Long-Press (Mobil) zeigt Aktionen
    let lpTimer=null;
    tile.addEventListener('touchstart',()=>{lpTimer=setTimeout(()=>tile.classList.toggle('show-actions'),550);},{passive:true});
    tile.addEventListener('touchend',()=>clearTimeout(lpTimer),{passive:true});
    tile.addEventListener('touchmove',()=>clearTimeout(lpTimer),{passive:true});
  }
  tile.addEventListener('click',()=>selectAlbum(a.id));
  return tile;
}

function buildBreadcrumb(albumId){
  const crumbs=[];let cur=allAlbums.find(a=>a.id===albumId);
  while(cur){crumbs.unshift({id:cur.id,name:cur.name});cur=cur.parentId?allAlbums.find(a=>a.id===cur.parentId):null;}
  return crumbs;
}

async function loadPhotos(albumId,wrap){
  try{
    const r=await fetch(`/api/albums/${albumId}/photos`);
    if(r.status===423){wrap.innerHTML=`<div class="empty-state"><div class="e-icon">🔒</div><p>${t('album.locked_toast')}</p></div>`;return;}
    currentPhotos=await r.json();
    if(!currentPhotos.length){wrap.innerHTML=`<div class="empty-state"><div class="e-icon">📷</div><p>${t('albums.empty')}</p></div>`;return;}
    wrap.innerHTML='<div class="photo-grid" id="photo-grid"></div>';
    const grid=document.getElementById('photo-grid');
    const isSharedAlbum = albumId === '__shared__' || (me&&me.type==='observer');

    currentPhotos.forEach((p,i)=>{
      const isOwn=p.ownerId===me.id;
      const card=document.createElement('div');
      card.className='photo-card';
      card.dataset.photoId=p.id;
      card.dataset.idx=i;

      // ── Image wrap ──
      const imgWrap=document.createElement('div');
      imgWrap.className='photo-img-wrap';

      // Checkbox – only for non-shared albums (shared album = view only)
      if(!isSharedAlbum){
        const chk=document.createElement('div');
        chk.className='photo-check';
        chk.innerHTML='<span class="photo-check-icon">✓</span>';
        chk.addEventListener('click',e=>toggleSelect(e,p.id));
        imgWrap.appendChild(chk);
      }

      // Shared badge
      if(p.shared){
        const badge=document.createElement('span');
        badge.className='shared-badge';
        badge.textContent=t('photo.shared_badge');
        imgWrap.appendChild(badge);
      }

      // Placeholder (replaced by thumb after load)
      const ph=document.createElement('div');
      ph.className='thumb-placeholder thumb-loading';
      ph.id='tp-'+p.id;
      ph.textContent='🖼';
      imgWrap.appendChild(ph);

      // Click on image wrap → lightbox (whole area, not just img)
      imgWrap.addEventListener('click', e=>{
        // Don't open lightbox if clicking the checkbox
        if(e.target.closest('.photo-check')) return;
        if(p.pending){toast(t('photo.pending'),'error');return;}
        openLightbox(i);
      });

      card.appendChild(imgWrap);

      // ── Info ──
      const info=document.createElement('div');
      info.className='photo-info';
      const nameEl=document.createElement('div');
      nameEl.className='photo-name';
      nameEl.title=p.originalName;
      nameEl.textContent=p.originalName;
      const metaEl=document.createElement('div');
      metaEl.className='photo-meta';
      const dateSpan=document.createElement('span');
      dateSpan.textContent=fmtDate(p.uploadedAt);
      metaEl.appendChild(dateSpan);
      if(!isOwn){
        const ownerSpan=document.createElement('span');
        ownerSpan.className='owner-tag';
        ownerSpan.textContent=p.ownerName;
        metaEl.appendChild(ownerSpan);
      }
      info.appendChild(nameEl);
      info.appendChild(metaEl);
      card.appendChild(info);

      grid.appendChild(card);
      loadThumb(p.id,i);
    });
  }catch(e){
    console.error('loadPhotos error:',e);
    wrap.innerHTML=`<div class="empty-state"><p>${t('error')}</p></div>`;
  }
}

function toggleSelect(e,photoId){
  e.stopPropagation();
  if(selectedPhotos.has(photoId))selectedPhotos.delete(photoId);
  else selectedPhotos.add(photoId);
  const card=document.querySelector(`[data-photo-id="${photoId}"]`);
  if(card)card.classList.toggle('selected',selectedPhotos.has(photoId));
  updateSelectionBar();
}

function toggleSelectAll(){
  if(selectedPhotos.size===currentPhotos.length){
    // deselect all
    selectedPhotos.clear();
    document.querySelectorAll('.photo-card').forEach(c=>c.classList.remove('selected'));
  } else {
    // select all
    currentPhotos.forEach(p=>selectedPhotos.add(p.id));
    document.querySelectorAll('.photo-card').forEach(c=>c.classList.add('selected'));
  }
  updateSelectionBar();
}

function updateSelectionBar(){
  const bar=document.getElementById('selection-bar');
  const count=document.getElementById('sel-count');
  const btnAll=document.getElementById('btn-sel-all');
  const btnDl=document.getElementById('btn-dl');
  const btnDel=document.getElementById('btn-del-sel');
  const btnShare=document.getElementById('btn-share');
  const btnUnshare=document.getElementById('btn-unshare');
  if(!bar)return;
  const n=selectedPhotos.size;
  bar.classList.toggle('visible',n>0);
  if(count)count.textContent=n>0?t('selection.count',n):t('selection.none');
  if(btnAll)btnAll.textContent=n===currentPhotos.length?t('selection.deselect_all'):t('selection.select_all');
  const selPhotos=[...selectedPhotos].map(id=>currentPhotos.find(p=>p.id===id)).filter(Boolean);
  // Download: only if all selected can be downloaded
  const canDl=n>0&&selPhotos.every(p=>p.canDownload);
  if(btnDl)btnDl.style.display=canDl?'':'none';
  // Share/Unshare: only own photos or admin
  const canShare=n>0&&selPhotos.every(p=>p.canShare);
  const allShared=canShare&&selPhotos.every(p=>p.shared);
  const noneShared=canShare&&selPhotos.every(p=>!p.shared);
  if(btnShare)btnShare.style.display=(canShare&&!allShared)?'':'none';
  if(btnUnshare)btnUnshare.style.display=(canShare&&!noneShared)?'':'none';
  // Delete: only own or admin
  const canDel=n>0&&selPhotos.every(p=>p.ownerId===me.id||me.role==='admin');
  if(btnDel)btnDel.style.display=canDel?'':'none';
  // Cover: exactly one photo selected + album manageable
  const btnCover=document.getElementById('btn-cover');
  if(btnCover)btnCover.style.display=(n===1&&currentAlbumCanManage)?'':'none';
}

async function downloadSelected(){
  for(const id of selectedPhotos){

    document.body.appendChild(a);a.click();a.remove();

async function loadThumb(id,idx){
  try{
    const r=await fetch(`/api/photos/${id}/thumb`);
    const ph=document.getElementById(`tp-${id}`);
    if(!r.ok){
      if(!ph)return;
      if(r.status===423){ // pending re-encryption by owner
        const pend=document.createElement('div');
        pend.className='thumb-pending';
        pend.innerHTML='<span class="tp-icon">🔒</span><span>'+t('photo.pending')+'</span>';
        ph.replaceWith(pend);
      } else if(r.status===401){
        const data=await r.json().catch(()=>({}));
        if(data.code==='DEK_MISSING'){toast(t('relogin.required'),'error');}
      }
      return;
    }
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    lbThumbUrls[id]=url;
    if(!ph)return;
    const img=document.createElement('img');
    img.className='photo-thumb';
    img.src=url;
    img.alt='';
    img.draggable=false;
    ph.replaceWith(img);
    lbThumbCache[id]=url;
  }catch(e){console.warn('loadThumb error:',id,e);}
}

// LIGHTBOX with navigation
// ═══════════════════════════════════════════════════════════════════
function openLightbox(idx){
  lbPhotos=currentPhotos;lbIndex=idx;
  document.getElementById('lightbox').classList.add('open');
  renderLightbox();
  buildStrip();
}

function renderLightbox(){
  const p=lbPhotos[lbIndex];if(!p)return;
  document.getElementById('lb-title').textContent=p.originalName;
  document.getElementById('lb-counter').textContent=`${lbIndex+1} / ${lbPhotos.length}`;
  document.getElementById('lb-prev').disabled=lbIndex===0;
  document.getElementById('lb-next').disabled=lbIndex===lbPhotos.length-1;

  // Canvas-based rendering: prevents "Save image as" from getting a usable URL
  const canvas=document.getElementById('lightbox-img');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  function drawOnCanvas(blobUrl){
    const tmpImg=new Image();
    tmpImg.onload=()=>{
      // Size canvas to fit viewport
      const maxW=window.innerWidth;
      const maxH=window.innerHeight-90;   // Filmstreifen unten
      const scale=Math.min(maxW/tmpImg.width,maxH/tmpImg.height);   // auch hochskalieren
      canvas.width=tmpImg.width*scale;
      canvas.height=tmpImg.height*scale;
      ctx.drawImage(tmpImg,0,0,canvas.width,canvas.height);
      // Subtle watermark with username
      if(me&&me.username) window.addWatermark(canvas,me.username);
      URL.revokeObjectURL(blobUrl); // free memory immediately
    };
    tmpImg.src=blobUrl;
  }

  if(lbThumbUrls[p.id]){
    // Re-fetch so we get a fresh blob (cached URL was revoked)
    fetch(`/api/photos/${p.id}/thumb`).then(r=>r.blob()).then(b=>drawOnCanvas(URL.createObjectURL(b))).catch(()=>{});
    fetch(`/api/photos/${p.id}/full`).then(r=>r.ok?r.blob():null).then(b=>{if(b)drawOnCanvas(URL.createObjectURL(b));}).catch(()=>{});
  } else {
    fetch(`/api/photos/${p.id}/thumb`).then(r=>r.blob()).then(b=>{
      const url=URL.createObjectURL(b);lbThumbUrls[p.id]=url;drawOnCanvas(URL.createObjectURL(b));
      fetch(`/api/photos/${p.id}/full`).then(r=>r.ok?r.blob():null).then(fb=>{if(fb)drawOnCanvas(URL.createObjectURL(fb));}).catch(()=>{});
    }).catch(()=>{});
  }
  // Highlight active strip thumb
  document.querySelectorAll('.lb-strip-thumb').forEach((el,i)=>{
    el.classList.toggle('active',i===lbIndex);
  });
  // Scroll strip to active
  const strip=document.getElementById('lb-strip');
  const active=strip.children[lbIndex];
  if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function buildStrip(){
  const strip=document.getElementById('lb-strip');strip.innerHTML='';
  lbPhotos.forEach((p,i)=>{
    const img=document.createElement('img');img.className='lb-strip-thumb';
    img.alt='';img.loading='lazy';
    if(lbThumbUrls[p.id])img.src=lbThumbUrls[p.id];
    else img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; // transparent placeholder
    img.addEventListener('click',()=>{lbIndex=i;renderLightbox();});
    img.classList.toggle('active',i===lbIndex);
    strip.appendChild(img);
    // Lazy load strip thumbs
    if(!lbThumbUrls[p.id]){
      fetch(`/api/photos/${p.id}/thumb`).then(r=>r.blob()).then(b=>{
        const url=URL.createObjectURL(b);lbThumbUrls[p.id]=url;img.src=url;
        // Also update main if this is current
        if(lbIndex===i)document.getElementById('lightbox-img').src=url;
      }).catch(()=>{});
    }
  });
}

function lbNavigate(dir){
  lbIndex=Math.max(0,Math.min(lbPhotos.length-1,lbIndex+dir));
  renderLightbox();
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  const canvas=document.getElementById('lightbox-img');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// Keyboard navigation
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');
  if(!lb.classList.contains('open'))return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')lbNavigate(1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')lbNavigate(-1);
  else if(e.key==='Escape')closeLightbox();
});

// Click outside image to close
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLightbox();});
document.getElementById('lb-img-overlay').addEventListener('click',()=>closeLightbox());

// ── Touch / Swipe support ──────────────────────────────────────────
(function(){
  const lb=document.getElementById('lightbox');
  let touchStartX=0,touchStartY=0,touchStartTime=0;

  lb.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    touchStartTime=Date.now();
  },{passive:true});

  lb.addEventListener('touchend',e=>{
    if(e.changedTouches.length!==1)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    const dt=Date.now()-touchStartTime;
    const absDx=Math.abs(dx),absDy=Math.abs(dy);

    // Must be fast enough (<400ms), horizontal enough (2x more than vertical)
    // and long enough (>40px) to count as a swipe
    if(dt<400&&absDx>40&&absDx>absDy*1.5){
      if(dx<0)lbNavigate(1);   // swipe left  → next
      else    lbNavigate(-1);  // swipe right → prev
    }
    // Short tap on background (not on image/controls) → close
    else if(dt<200&&absDx<10&&absDy<10){
      const target=e.changedTouches[0].target;
      if(target===lb||target.id==='lb-img-overlay')closeLightbox();
    }
  },{passive:true});
})();

function openAlbumPermModal(userId,username){
  albumPermTargetId=userId;document.getElementById('albumperm-uname').textContent=username;
  const user=allUsers.find(u=>u.id===userId);const current=user?.canViewAlbums||[];
  document.getElementById('album-perm-tree').innerHTML=renderPermTree(null,0,current);
  document.getElementById('modal-album-perm').classList.add('open');
}
function renderPermTree(parentId,depth,current){
  return albumChildren(parentId).map(album=>{
    const indent=depth*16;const checked=current.includes(album.id)?'checked':'';
    const owner=allUsers.find(u=>u.id===album.ownerId)?.username??'?';
    return `<label class="perm-album-item">
      <div class="perm-album-indent" style="width:${indent}px"></div>
      <input type="checkbox" value="${album.id}" ${checked}>
      <span>${esc(album.name)}</span>
      <span class="perm-album-owner">@${esc(owner)}</span>
    </label>${renderPermTree(album.id,depth+1,current)}`;
  }).join('');
}
async function saveAlbumPermissions(){
  const checked=[...document.querySelectorAll('#album-perm-tree input:checked')].map(c=>c.value);
  const r=await api('PUT',`/api/users/${albumPermTargetId}/album-permissions`,{canViewAlbums:checked});
  if(r.ok){toast(t('perm.saved'),'success');closeModal('modal-album-perm');loadUsers();}else toast(t('perm.save_err'),'error');
}
function openResetPw(id,username){resetTargetId=id;document.getElementById('reset-uname').textContent=username;document.getElementById('reset-pw').value='';document.getElementById('modal-reset-pw').classList.add('open');}
async function doResetPassword(){
  const pw=document.getElementById('reset-pw').value;
  if(!pw||pw.length<6){toast(t('account.pw_short'),'error');return;}
  const r=await api('PUT',`/api/users/${resetTargetId}/password`,{password:pw});
  if(r.ok){toast(t('pw.set'),'success');closeModal('modal-reset-pw');}else toast((await r.json()).error,'error');
}

// ACCOUNT
async function changePassword(){
  const current=document.getElementById('pw-current').value;
  const next=document.getElementById('pw-new').value;
  const confirm=document.getElementById('pw-confirm').value;
  if(next!==confirm){toast(t('account.pw_mismatch'),'error');return;}
  if(next.length<8){toast(t('setup.pw_short'),'error');return;}
  const r=await api('PUT','/api/me/password',{currentPassword:current,newPassword:next});
  if(r.ok){toast(t('account.pw_changed'),'success');['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');}
  else toast((await r.json()).error,'error');
}

// HELPERS
function api(method,url,body){return fetch(url,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=`show ${type}`;clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='',3000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');}
function fmtDate(ts){return new Date(ts).toLocaleDateString(lang==='de'?'de-DE':'en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});}

// ═══════════════════════════════════════════════════════════════════
// DOWNLOAD PROTECTION
// ═══════════════════════════════════════════════════════════════════
(function() {

  // 1. Block right-click context menu on photo elements
  document.addEventListener('contextmenu', e => {
    const isProtected =
      e.target.closest('#lightbox') ||
      e.target.closest('.photo-img-wrap') ||
      e.target.closest('.lb-strip') ||
      e.target.classList.contains('photo-thumb') ||
      e.target.classList.contains('lb-strip-thumb') ||
      e.target.id === 'lightbox-img';
    if (isProtected) {
      e.preventDefault();
      return false;
    }
  });

  // 2. Block drag-and-drop of images (another way to extract)
  document.addEventListener('dragstart', e => {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
      return false;
    }
  });

  // 3. Block common keyboard shortcuts for saving
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb || !lb.classList.contains('open')) return;
    const key = e.key.toLowerCase();
    // Block Ctrl/Cmd + S (save), Ctrl/Cmd + Shift + S, PrintScreen
    if ((e.ctrlKey || e.metaKey) && (key === 's' || key === 'u')) {
      e.preventDefault(); return false;
    }
    if (e.key === 'PrintScreen') {
      e.preventDefault(); return false;
    }
  }, true); // capture phase

  // 4. Render lightbox image on Canvas instead of <img> src
  // This prevents "Save image as" from getting the real URL
  // and makes the image non-draggable at the pixel level
  window.renderImageOnCanvas = function(blobUrl, canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      // Fit inside canvas maintaining aspect ratio
      const maxW = canvas.clientWidth  || canvas.width;
      const maxH = canvas.clientHeight || canvas.height;
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(blobUrl); // immediately free the blob URL
    };
    img.src = blobUrl;
  };

  // 5. Watermark canvas overlay (optional subtle protection)
  window.addWatermark = function(canvas, username) {
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#ffffff';
    ctx.font = `${Math.max(14, canvas.width * 0.02)}px DM Sans, sans-serif`;
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(-Math.PI / 6);
    if(localStorage.getItem('vermeer_wm')!=='1')return;   // Wasserzeichen standardmäßig aus
    const text = `Vermeer · ${username}`;
    const cols = Math.ceil(canvas.width  / 300) + 2;
    const rows = Math.ceil(canvas.height / 150) + 2;
    for (let r = -rows; r <= rows; r++) {
      for (let c = -cols; c <= cols; c++) {
        ctx.fillText(text, c * 300 - 150, r * 150);
      }
    }
    ctx.restore();
  };

})();

// Dismissible modals: click on backdrop closes (NOT setup/recovery-code – those are mandatory)
['modal-album','modal-new-user','modal-album-perm','modal-reset-pw','modal-recover'].forEach(id=>{

});
